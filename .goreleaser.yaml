version: 2

builds:
  - id: plugin
    binary: workflow-plugin-acpx
    main: ./cmd/workflow-plugin-acpx
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/GoCodeAlone/workflow-plugin-acpx/internal.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    files:
      - plugin.json

checksum:
  name_template: checksums.txt

release:
  draft: false
